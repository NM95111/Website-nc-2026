<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP | Nicolas &amp; Cecilia</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Great+Vibes&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="site-nav">
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html">Welcome</a></li>
            <li><a href="our-story.html">Our Story</a></li>
            <li><a href="travel.html">Travel &amp; Accommodation</a></li>
            <li><a href="registry.html">Our Registry</a></li>
            <li><a href="rsvp.html">RSVP</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main>
        <!-- Hero Section -->
        <section class="hero hero-short">
            <div class="hero-bg" style="background-image: url('images/RSVP top photo.jpg');"></div>
            <div class="hero-content">
                <h1 class="script-heading">Save Your Seat</h1>
            </div>
        </section>

        <!-- Intro Section (Cream) -->
        <section class="section section-cream">
            <div class="section-inner">
                <p class="section-text">
                    We can't wait to celebrate with you! We kindly ask that you submit your RSVP by filling out the below form to confirm your attendance:
                </p>
            </div>
        </section>

        <!-- RSVP Form (White) -->
        <section class="section section-white">
            <div class="section-inner">
                <form class="rsvp-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
                    <div class="form-group">
                        <label for="full-name">Full Name</label>
                        <input
                            type="text"
                            id="full-name"
                            name="full_name"
                            required
                            aria-label="Your full name"
                        >
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            aria-label="Your email address"
                        >
                    </div>

                    <div class="form-group">
                        <label for="guests">Number of Guests</label>
                        <input
                            type="number"
                            id="guests"
                            name="num_guests"
                            min="1"
                            max="10"
                            value="1"
                            required
                            aria-label="Number of guests attending"
                        >
                    </div>

                    <div class="form-group">
                        <label for="attending">Attending?</label>
                        <select id="attending" name="attending" required aria-label="Will you be attending?">
                            <option value="">-- Select an option --</option>
                            <option value="yes">Yes, happily attending</option>
                            <option value="no">No, sadly can't make it</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="dietary">Dietary Requirements</label>
                        <textarea
                            id="dietary"
                            name="dietary_requirements"
                            placeholder="Please let us know of any dietary needs..."
                            aria-label="Dietary requirements"
                        ></textarea>
                    </div>

                    <div class="form-group">
                        <label for="message">Message for the Couple</label>
                        <textarea
                            id="message"
                            name="message"
                            placeholder="Share a special message or wish..."
                            aria-label="Message for the couple"
                        ></textarea>
                    </div>

                    <button type="submit" class="btn btn-sage">Submit RSVP</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <p class="footer-title">NICOLAS AND CECILIA</p>
        <p class="footer-copy">&copy; 2025 by Nicolas and Cecilia</p>
    </footer>

    <!-- Scripts -->
    <script src="js/main.js"></script>
</body>
</html>
